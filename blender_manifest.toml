schema_version = "1.0.0"

id = "yohsai"
version = "0.7.5"
name = "Yohsai"
tagline = "Experimental clothing construction tools"
maintainer = "Yohsai Developers"
type = "add-on"

blender_version_min = "5.1.0"
platforms = ["windows-x64", "macos-arm64"]

license = ["SPDX:GPL-3.0-or-later"]

tags = ["Modeling", "Pipeline"]

wheels = [
    "./wheels/pypdf-6.14.2-py3-none-any.whl",
]

[permissions]
files = "Load pattern PDF and write Yohsai JSON"
network = "Configure ZOZO Contact Solver through its localhost MCP server"

[build]
paths = [
    "__init__.py",
    "CMakeLists.txt",
    "build_native.ps1",
    "ui.py",
    "kitsuke.py",
    "zozo_handoff.py",
    "zozo_mcp_client.py",
    "cosserat_native.py",
    "mesh_loader.py",
    "yohsai_svg_parser.py",
    "yohsai_defaults.json",
    "SVG_TO_JSON_SPEC.md",
    "KITSUKE_DESIGN.md",
    "COSSERAT_DESIGN.md",
    "GRAINLINE_DESIGN.md",
    "XPBD_HANDOFF_DESIGN.md",
    "THIRD_PARTY_NOTICES.md",
    "DESIGN_PHILOSOPHY.md",
    "README.md",
    "DEVELOPMENT_NOTES.md",
    "SESSION_MEMORY.md",
    "UTIL/silhouette_export.py",
    "UTIL/README.md",
    "LICENSE",
    "bin/yohsai_cosserat.dll",
    "bin/vcomp140.dll",
    "bin/libyohsai_cosserat.dylib",
    "native/CMakeLists.txt",
    "native/include/yohsai_cosserat/c_api.h",
    "native/src/math.hpp",
    "native/src/solver.hpp",
    "native/src/solver.cpp",
    "native/src/c_api.cpp",
    "native/tests/test_solver.cpp",
]
